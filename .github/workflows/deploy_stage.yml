name: Stage

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - run: npm test

  deploy:
    name: Deploy to Stage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - name: Setup CLI
        uses: adobe/aio-cli-setup-action@1.3.0
        with:
          os: ubuntu-latest
          version: 11.x.x
      - name: Auth
        uses: adobe/aio-apps-action@3.3.0
        with:
          os: ubuntu-latest
          command: oauth_sts
          CLIENTID: ${{ secrets.CLIENTID_STAGE }}
          CLIENTSECRET: ${{ secrets.CLIENTSECRET_STAGE }}
          TECHNICALACCOUNTID: ${{ secrets.TECHNICALACCID_STAGE }}
          TECHNICALACCOUNTEMAIL: ${{ secrets.TECHNICALACCEMAIL_STAGE }}
          IMSORGID: ${{ secrets.IMSORGID_STAGE }}
          SCOPES: ${{ secrets.SCOPES_STAGE }}
      - name: Build
        env:
          AIO_RUNTIME_NAMESPACE: ${{ secrets.AIO_RUNTIME_NAMESPACE_STAGE }}
        uses: adobe/aio-apps-action@3.3.0
        with:
          os: ubuntu-latest
          command: build
      - name: Deploy
        env:
          AIO_RUNTIME_NAMESPACE: ${{ secrets.AIO_RUNTIME_NAMESPACE_STAGE }}
          AIO_RUNTIME_AUTH: ${{ secrets.AIO_RUNTIME_AUTH_STAGE }}
          AIO_PROJECT_ID: ${{ secrets.AIO_PROJECT_ID_STAGE }}
          AIO_PROJECT_NAME: ${{ secrets.AIO_PROJECT_NAME_STAGE }}
          AIO_PROJECT_ORG_ID: ${{ secrets.AIO_PROJECT_ORG_ID_STAGE }}
          AIO_PROJECT_WORKSPACE_ID: ${{ secrets.AIO_PROJECT_WORKSPACE_ID_STAGE }}
          AIO_PROJECT_WORKSPACE_NAME: ${{ secrets.AIO_PROJECT_WORKSPACE_NAME_STAGE }}
          AIO_PROJECT_WORKSPACE_DETAILS_SERVICES: ${{ secrets.AIO_PROJECT_WORKSPACE_DETAILS_SERVICES_STAGE }}
          AIO_CLIENTID: ${{ secrets.CLIENTID_STAGE }}
          AIO_CLIENTSECRET: ${{ secrets.CLIENTSECRET_STAGE }}
          AIO_SCOPES: ${{ secrets.SCOPES_STAGE }}
          AIO_IMSORGID: ${{ secrets.IMSORGID_STAGE }}
          AIO_EVENTS_PROVIDER_ID: ${{ secrets.EVENTS_PROVIDER_ID_STAGE }}
          EMAIL_TOKEN: ${{ secrets.EMAIL_TOKEN_STAGE }}
          PROXY_TOKEN: ${{ secrets.PROXY_TOKEN }}
          EBS_BASE_URL: ${{ secrets.EBS_BASE_URL_STAGE }}
          EBS_BASE_URL_STAGE: ${{ secrets.EBS_BASE_URL_STAGE }}
          EBS_API_KEY: ${{ secrets.EBS_API_KEY_STAGE }}
          EBS_API_KEY_STAGE: ${{ secrets.EBS_API_KEY_STAGE }}
          SYNC_STATUS_TOKEN: ${{ secrets.SYNC_STATUS_TOKEN_STAGE }}
          EDGE_COMMERCE_API_ORDERS_TOKEN: ${{ secrets.EDGE_COMMERCE_API_ORDERS_TOKEN_STAGE }}
          EDGE_COMMERCE_API_BASE: ${{ secrets.EDGE_COMMERCE_API_BASE_STAGE }}
          EBS_CREATE_ORDER_ENDPOINT: ${{ secrets.EBS_CREATE_ORDER_ENDPOINT_STAGE }}
        uses: adobe/aio-apps-action@3.3.0
        with:
          os: ubuntu-latest
          command: deploy
          noPublish: true

  post-deploy-test:
    name: Post-Deploy Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - name: Post-Deploy Tests
        run: npm run test-postdeploy
        env:
          AIO_RUNTIME_NAMESPACE: ${{ secrets.AIO_RUNTIME_NAMESPACE_STAGE }}
