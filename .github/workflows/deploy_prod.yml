name: Production

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write
  issues: read
  pull-requests: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - run: npm test

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - name: Setup CLI
        uses: adobe/aio-cli-setup-action@1.3.0
        with:
          os: ubuntu-latest
          version: 11.x.x
      - name: Auth
        uses: adobe/aio-apps-action@3.3.0
        with:
          os: ubuntu-latest
          command: oauth_sts
          CLIENTID: ${{ secrets.CLIENTID_PROD }}
          CLIENTSECRET: ${{ secrets.CLIENTSECRET_PROD }}
          TECHNICALACCOUNTID: ${{ secrets.TECHNICALACCID_PROD }}
          TECHNICALACCOUNTEMAIL: ${{ secrets.TECHNICALACCEMAIL_PROD }}
          IMSORGID: ${{ secrets.IMSORGID_PROD }}
          SCOPES: ${{ secrets.SCOPES_PROD }}
      - name: Semantic Release
        run: npm run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AIO_RUNTIME_NAMESPACE: ${{ secrets.AIO_RUNTIME_NAMESPACE_PROD }}
          AIO_RUNTIME_AUTH: ${{ secrets.AIO_RUNTIME_AUTH_PROD }}
          AIO_PROJECT_ID: ${{ secrets.AIO_PROJECT_ID_PROD }}
          AIO_PROJECT_NAME: ${{ secrets.AIO_PROJECT_NAME_PROD }}
          AIO_PROJECT_ORG_ID: ${{ secrets.AIO_PROJECT_ORG_ID_PROD }}
          AIO_PROJECT_WORKSPACE_ID: ${{ secrets.AIO_PROJECT_WORKSPACE_ID_PROD }}
          AIO_PROJECT_WORKSPACE_NAME: ${{ secrets.AIO_PROJECT_WORKSPACE_NAME_PROD }}
          AIO_PROJECT_WORKSPACE_DETAILS_SERVICES: ${{ secrets.AIO_PROJECT_WORKSPACE_DETAILS_SERVICES_PROD }}
          AIO_CLIENTID: ${{ secrets.CLIENTID_PROD }}
          AIO_CLIENTSECRET: ${{ secrets.CLIENTSECRET_PROD }}
          AIO_SCOPES: ${{ secrets.SCOPES_PROD }}
          AIO_IMSORGID: ${{ secrets.IMSORGID_PROD }}
          AIO_EVENTS_PROVIDER_ID: ${{ secrets.EVENTS_PROVIDER_ID_PROD }}
          EMAIL_TOKEN: ${{ secrets.EMAIL_TOKEN_PROD }}
          PROXY_TOKEN: ${{ secrets.PROXY_TOKEN }}
          EBS_BASE_URL: ${{ secrets.EBS_BASE_URL_PROD }}
          EBS_BASE_URL_STAGE: ${{ secrets.EBS_BASE_URL_STAGE }}
          EBS_API_KEY: ${{ secrets.EBS_API_KEY_PROD }}
          EBS_API_KEY_STAGE: ${{ secrets.EBS_API_KEY_STAGE }}
          SYNC_STATUS_TOKEN: ${{ secrets.SYNC_STATUS_TOKEN_PROD }}
          EDGE_COMMERCE_API_ORDERS_TOKEN: ${{ secrets.EDGE_COMMERCE_API_ORDERS_TOKEN_PROD }}
          EDGE_COMMERCE_API_BASE: ${{ secrets.EDGE_COMMERCE_API_BASE_PROD }}
          EBS_CREATE_ORDER_ENDPOINT: ${{ secrets.EBS_CREATE_ORDER_ENDPOINT_PROD }}
